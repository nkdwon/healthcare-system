name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint with flake8
        run: |
          pip install flake8
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  build-docker-images:
    needs: backend-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build ./backend --file ./backend/Dockerfile --tag healthcare-backend:latest

      - name: Build Frontend Image
        run: docker build ./frontend --file ./frontend/Dockerfile --tag healthcare-frontend:latest

  deploy-to-render:
    needs: build-docker-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to Render
        run: |
          echo "Triggering Render Deploy Hook..."
          # Aqui você colocaria o Deploy Hook do Render (explicarei como pegar)
          # curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
